name: Deploy to Github Pages

on:
    push:
        branches: [main]

jobs:
    build:
        name: CI
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Test
              run: npm run test -- --coverage
            
            - name: Build
              run: npm run build
            - name: Publish
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/